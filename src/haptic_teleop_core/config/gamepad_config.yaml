/**:
  ros__parameters:
    # To find your specific button/axis indices, run the joystick node and echo the raw data:
    # 1. ros2 run joy joy_node
    # 2. ros2 topic echo /joy
    # Press a physical button and look at the 'buttons' or 'axes' array to find its index.
    
    require_enable_button: true
    enable_button: 4 # LB button on Xbox controller, this button must be held down to enable teleoperation commands
    axis_linear:
      x: 1 # Left stick vertical axis on Xbox controller
    scale_linear:
      x: 4.0 # Scale down the linear velocity commands to 400% of the joystick input
    axis_angular:
      yaw: 0 # Right stick horizontal axis on Xbox controller
    scale_angular:
      yaw: 2.0 # Scale down the angular velocity commands to 200% of the joystick input